# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# 作用是给 tmux 一套通用、好用的默认设置，类似 vim-sensible 之于 Vim
set -g @plugin 'tmux-plugins/tmux-sensible'
# 开启 pane 编号显示（内部）
set -g pane-border-format "P#{pane_index}"
# 显示 pane 边框（确保编号能显示）
set -g pane-border-status top
# enable multiple color
set -g default-terminal "tmux-256color"

run '~/.tmux/plugins/tpm/tpm'

## --  personal custom -- ##
# -- prefix
unbind C-b
set -g prefix 'C-a'         

bind -n M-v copy-mode 

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
# linux
#bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear "xsel -i --clipboard"
# mac
bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy -i --clipboard"
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

set -g mouse on
# -- navigation

# create session
bind C-c new-session

# window management
bind -n M-o new-window -c "#{pane_current_path}"
bind -n M-O break-pane
bind -n M-Q kill-pane

# window navigation
unbind n
unbind p
unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9
unbind 0
bind -r C-p previous-window
bind -r C-n next-window

# 用 prefix+数字 切换 window（Option+数字在 iTerm2/macOS 下易冲突，不依赖 M-1）
#bind 1 select-window -t 0
#bind 2 select-window -t 1
#bind 3 select-window -t 2
#bind 4 select-window -t 3
#bind 5 select-window -t 4
#bind 6 select-window -t 5
#bind 7 select-window -t 6
#bind 8 select-window -t 7
#bind 9 select-window -t 8
#bind 0 select-window -t 9
bind 0 select-window -t 0
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

bind -n M-! join-pane -t :1
bind -n M-@ join-pane -t :2
bind -n 'M-#' join-pane -t :3
bind -n 'M-$' join-pane -t :4
bind -n M-% join-pane -t :5
bind -n M-^ join-pane -t :6
bind -n M-& join-pane -t :7
bind -n M-* join-pane -t :8
bind -n M-( join-pane -t :9

# pane navigation（prefix+数字已用于切换 window，按编号选 pane 用 prefix+Ctrl+数字）
bind C-1 select-pane -t:.1
bind C-2 select-pane -t:.2
bind C-3 select-pane -t:.3
bind C-4 select-pane -t:.4
bind C-5 select-pane -t:.5
bind C-6 select-pane -t:.6
bind C-7 select-pane -t:.7
bind C-8 select-pane -t:.8
bind C-9 select-pane -t:.9
bind C-0 select-pane -t:.0
# prefix + h/j/k/l 在窗格间移动（vim 方向）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# prefix + H/J/K/L 与对应方向窗格交换位置（不覆盖上面的移动）
# tmux 仅支持 -U/-D，左右用 -t {left-of}/{right-of}
bind -r H swap-pane -t '{left-of}'
bind -r J swap-pane -D
bind -r K swap-pane -U
bind -r L swap-pane -t '{right-of}'

# create pane
unbind Up
unbind Down
unbind Left
unbind Right
bind-key Up split-window -vb -c "#{pane_current_path}"
bind-key Down split-window -v -c "#{pane_current_path}"
bind-key Left split-window -hb -c "#{pane_current_path}"
bind-key Right split-window -h -c "#{pane_current_path}"
